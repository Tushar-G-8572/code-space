apiVersion: skaffold/v4beta13
kind: Config
  

build:
  local:
    push: false
  tagPolicy:
    customTemplate:
      template: "latest"
  artifacts:

    - image: ai-orchestration
      context: ai-orchestration
      docker:
        dockerfile: dockerfile
      sync:
        infer:
          - "src/**"

    - image: agent
      context: sandbox/agents
      docker:
        dockerfile: dockerfile
    
    - image: router
      context: sandbox/router
      docker:
        dockerfile: dockerfile


    - image: sandbox
      context: sandbox/server
      docker:
        dockerfile: dockerfile


    - image: template
      context: sandbox/template
      docker:
        dockerfile: dockerfile
  
manifests:
  rawYaml:
    - k8s/ai-deployment.yml
    - k8s/ai-service.yml
    - k8s/router-deployment.yml
    - k8s/router-service.yml
    - k8s/sandbox-deployment.yml
    - k8s/sandbox-service.yml
    - k8s/rbac.yml
    - k8s/ingress.yml