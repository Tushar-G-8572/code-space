apiVersion: apps/v1
kind: Deployment
metadata:
  name:  ai-deployment
  labels:
    name:  ai-deployment
spec:
  replicas: 2
  selector: 
    matchLabels:
      app: ai-server
  template:
    metadata:
      labels:
        app:  ai-server
    spec:
      containers:
      - image:  ai-orchestration
        imagePullPolicy: IfNotPresent
        env:
          - name:  MISTRAL_API_KEY
            valueFrom:
              secretKeyRef:
                name:  ai-secret
                key:  MISTRAL_API_KEY
        name:  ai-server
        resources:
          requests:
            cpu: "500m"
            memory: "256Mi"
          limits:
            cpu: "1"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /api/ai/healthz
            port: 3000
          initialDelaySeconds: 90
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/ai/healthz
            port: 3000
          initialDelaySeconds: 30
          timeoutSeconds: 10    
        ports:
        - containerPort:  3000
          name:  ai-port
